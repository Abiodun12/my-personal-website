name: Gitleaks Security Scan

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  push:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full clone with .git directory

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: '.gitleaks.toml'
          GITLEAKS_PATH: '.'
          GITLEAKS_ARGS: 'detect --source=. --redact --verbose --exit-code=2 --report-format=sarif' 